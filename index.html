<!DOCTYPE html>
<html>
<head>
    <title>MRP Engine Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        button { cursor: pointer; padding: 6px 12px; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn-danger { background-color: #dc3545; color: white; border: none; border-radius: 4px; }
        .btn-primary { background-color: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>MRP Engine Dashboard</h1>

    <h3>Add/Update Part</h3>
    <input type="hidden" id="partId">
    <input type="text" id="partName" placeholder="Part Name" style="padding: 5px; margin-right: 5px;">
    <input type="number" id="stock" placeholder="Stock Level" style="padding: 5px; margin-right: 5px;">
    <input type="number" id="leadTime" placeholder="Lead Time" style="padding: 5px; margin-right: 5px;">
    <button class="btn-primary" onclick="savePart()">Save Part</button>

    <hr>

    <h3>BOM Link Manager</h3>
    <div style="margin-bottom: 20px;">
        <select id="parentPart" style="padding: 5px; margin-right: 10px; min-width: 150px;">
            <option value="">Select Parent...</option>
        </select>
        
        <select id="childPart" style="padding: 5px; margin-right: 10px; min-width: 150px;">
            <option value="">Select Component...</option>
        </select>
        
        <input type="number" id="bomQuantity" placeholder="Quantity" style="padding: 5px; margin-right: 10px; width: 100px;">
        <button onclick="saveBomLink()" style="padding: 5px 15px; cursor: pointer;">Link Parts</button>
    </div>

    <hr>

    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 100%;">
        <h3>All Parts</h3>
        <div>
            <button onclick="loadParts()">Refresh Part List</button>
            <button class="btn-danger" onclick="resetDatabase()">Reset Database (IDs to 1)</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Stock</th>
                <th>Lead Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="partTableBody"></tbody>
    </table>

    <script>
        // Runs all core data loaders on page startup
        function init() { 
            loadParts(); 
            loadDropdowns(); 
        }

        // Fetches and displays all items inside the data table view cleanly
        function loadParts() {
            fetch('/parts/all')
            .then(response => response.json())
            .then(data => {
                const body = document.getElementById('partTableBody');
                body.innerHTML = ''; // Clear previous entries to avoid duplicating rows
                
                data.forEach((part) => {
                    body.innerHTML += `<tr>
                        <td>${part.id}</td> 
                        <td>${part.partName}</td>
                        <td>${part.currentStock}</td>
                        <td>${part.leadTimeDays}</td>
                        <td>
                            <button onclick="editPart(${part.id}, '${part.partName}', ${part.currentStock}, ${part.leadTimeDays})">Edit</button>
                            <button onclick="deletePart(${part.id})">Delete</button>
                        </td>
                    </tr>`;
                });
            });
        }

        // Populates input fields to change data elements for a specific part
        function editPart(id, name, stock, lead) {
            document.getElementById('partId').value = id;
            document.getElementById('partName').value = name;
            document.getElementById('stock').value = stock;
            document.getElementById('leadTime').value = lead;
        }

        // Processes adding a new item or updating an existing item
       // Processes adding a new item or updating an existing item
        function savePart() {
            const id = document.getElementById('partId').value;
            const part = {
                id: id ? parseInt(id) : null,
                partName: document.getElementById('partName').value,
                currentStock: parseInt(document.getElementById('stock').value),
                leadTimeDays: parseInt(document.getElementById('leadTime').value)
            };
            
            // CRITICAL FIX: We must point exactly to '/parts/save' using POST 
            // so it perfectly matches your PartController.java
            fetch('/parts/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(part)
            })
            .then(response => {
                if(response.ok) {
                    // Reset input forms completely on success
                    document.getElementById('partId').value = ''; 
                    document.getElementById('partName').value = '';
                    document.getElementById('stock').value = '';
                    document.getElementById('leadTime').value = '';
                    loadParts(); 
                    loadDropdowns(); 
                } else {
                    alert("Failed to save part. Is your Spring Boot server running?");
                }
            })
            .catch(error => {
                console.error('Error saving part:', error);
                alert("Network error. Check your backend console.");
            });
        }

        // Deletes a specific item via its database ID tracking references
        function deletePart(id) {
            if(confirm("Are you sure you want to delete this part?")) {
                fetch('/parts/delete/' + id, { method: 'DELETE' })
                .then(() => { 
                    loadParts(); 
                    loadDropdowns(); 
                });
            }
        }

        // Populates both dropdown select fields inside the Bill of Materials manager
        function loadDropdowns() {
            fetch('/parts/all')
            .then(response => response.json())
            .then(data => {
                const parentSelect = document.getElementById('parentPart');
                const childSelect = document.getElementById('childPart');
                
                parentSelect.innerHTML = '<option value="">Select Parent...</option>';
                childSelect.innerHTML = '<option value="">Select Component...</option>';
                
                data.forEach(part => {
                    const optionHTML = `<option value="${part.id}">ID: ${part.id} - ${part.partName}</option>`;
                    parentSelect.innerHTML += optionHTML;
                    childSelect.innerHTML += optionHTML;
                });
            });
        }

        // Packages parent/child relationship structures into your relational BOM table
        function saveBomLink() {
            const parentId = document.getElementById('parentPart').value;
            const childId = document.getElementById('childPart').value;
            const quantity = document.getElementById('bomQuantity').value;

            if (!parentId || !childId || !quantity) {
                alert("Please select both a parent part, a component part, and enter a quantity.");
                return;
            }

            const bomLinkPayload = {
                parentPart: { id: parseInt(parentId) },
                childPart: { id: parseInt(childId) },
                quantity: parseInt(quantity)
            };

            fetch('/bom/add', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bomLinkPayload)
            })
            .then(response => {
                if(response.ok) {
                    alert("BOM Relationship created successfully!");
                    document.getElementById('bomQuantity').value = '';
                    document.getElementById('parentPart').value = '';
                    document.getElementById('childPart').value = '';
                    loadParts();
                    loadDropdowns();
                } else {
                    alert("Failed to save BOM relationship. Check backend console mapping.");
                }
            })
            .catch(error => console.error('Error saving BOM link:', error));
        }

        // Trigger system reset functionality from backend API endpoint safely
        function resetDatabase() {
            if(confirm("Are you sure you want to clear all data and reset IDs to 1?")) {
                fetch('/parts/reset', { method: 'POST' })
                .then(() => {
                    alert("Database Reset Successfully");
                    loadParts();
                    loadDropdowns();
                });
            }
        }

        // Triggers the initial configuration logic immediately when web view renders
        window.onload = function() {
            init();
        };
    </script>
</body>
</html>
