<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRP System - Premium Auth Portal</title>
    <style>
         body {
            background-color: #0b0f19;
            background-image: radial-gradient(circle at top right, rgba(0, 198, 255, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 114, 255, 0.1), transparent 50%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

         .auth-wrapper {
            position: relative;
            width: 850px;
            max-width: 100%;
            height: 500px;
            background: #111827;
            border: 1px solid rgba(0, 198, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(0, 198, 255, 0.25), 
                        0 15px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
        }

         .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
            box-sizing: border-box;
            width: 50%;
            z-index: 2;
        }

        .login-container {
            left: 0;
            opacity: 1;
        }

        .register-container {
            left: 0;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

         .auth-wrapper.toggled .login-container {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .auth-wrapper.toggled .register-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            pointer-events: all;
        }

        .auth-wrapper.toggled .overlay-container {
            transform: translateX(-100%);
        }

        .auth-wrapper.toggled .overlay {
            transform: translateX(50%);
        }

         .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .overlay {
            background: linear-gradient(135deg, #091026 30%, #0052d4 70%, #4364f7 100%);
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

         .overlay::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0, 198, 255, 0.2) 0%, transparent 60%);
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
            pointer-events: none;
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            box-sizing: border-box;
        }

        .overlay-right {
            right: 0;
        }

         h2 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.02em;
        }

        .overlay h2 {
            font-size: 2.3rem;
            letter-spacing: 0.05em;
            text-shadow: 0 0 15px rgba(0, 198, 255, 0.6);
        }

        .input-group {
            position: relative;
            margin: 25px 0;
            border-bottom: 2px solid #374151;
            display: flex;
            align-items: center;
        }

        .input-group label {
            position: absolute;
            top: -12px;
            left: 0;
            font-size: 0.75rem;
            color: #00c6ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 10px 30px 10px 0;
            background: transparent;
            border: none;
            outline: none;
            color: #f3f4f6;
            font-size: 1rem;
        }

         .input-icon {
            position: absolute;
            right: 5px;
            color: #00c6ff;
            font-size: 1.1rem;
            opacity: 0.8;
        }

         .btn-submit {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.4);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.8);
            transform: translateY(-1px);
        }

         .switch-hint {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
        }

        .switch-hint a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        
        <div class="form-container login-container">
            <form onsubmit="handleLoginRedirect(event)">
                <h2>Login</h2>
                
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter your username" required>
                    <span class="input-icon">👤</span>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                    <span class="input-icon">🔒</span>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
                
                <div class="switch-hint">
                    Don't have an account? <a href="#" class="register-trigger">Sign Up</a>
                </div>
            </form>
        </div>

        <div class="form-container register-container">
            <form onsubmit="event.preventDefault(); alert('Registration Engine Hooked!');">
                <h2>Create Account</h2>
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                    <span class="input-icon">📝</span>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                    <span class="input-icon">✉️</span>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create robust password" required>
                    <span class="input-icon">🔒</span>
                </div>
                
                <button type="submit" class="btn-submit">Register</button>
                
                <div class="switch-hint">
                    Already registered? <a href="#" class="login-trigger">Sign In</a>
                </div>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h2>WELCOME<br>BACK!</h2>
                </div>
            </div>
        </div>

    </div>

    <script>
        const authWrapper = document.querySelector('.auth-wrapper');
        const loginTrigger = document.querySelector('.login-trigger');
        const registerTrigger = document.querySelector('.register-trigger');
        
         registerTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            authWrapper.classList.add('toggled');
        });
        
        loginTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            authWrapper.classList.remove('toggled');
        });

         function handleLoginRedirect(event) {
            event.preventDefault();  
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
